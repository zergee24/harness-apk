name: Deploy APK to OSS

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: test
        type: choice
        options:
          - test
          - prod
      release_notes:
        description: "Release notes, one item per line. Empty uses recent commit titles."
        required: false
        type: string
      version_code:
        description: "Optional APK versionCode override. Test channel defaults to base versionCode + GitHub run number."
        required: false
        type: string
      version_name:
        description: "Optional base versionName override, for example 0.1.15. Debug suffix is added automatically for test."
        required: false
        type: string
  push:
    branches:
      - test
    paths:
      - ".github/workflows/deploy-apk-to-oss.yml"
      - "app/**"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "settings.gradle.kts"
      - "scripts/**"

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'test'
    runs-on: ubuntu-latest
    env:
      OSS_BUCKET: ${{ vars.OSS_BUCKET }}
      OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
      OSS_PREFIX: ${{ vars.OSS_PREFIX }}
      OSS_PUBLIC_BASE_URL: ${{ vars.OSS_PUBLIC_BASE_URL }}
      OSS_TEST_PREFIX: ${{ vars.OSS_TEST_PREFIX }}
      OSS_TEST_PUBLIC_BASE_URL: ${{ vars.OSS_TEST_PUBLIC_BASE_URL }}
      OSS_PROD_PREFIX: ${{ vars.OSS_PROD_PREFIX }}
      OSS_PROD_PUBLIC_BASE_URL: ${{ vars.OSS_PROD_PUBLIC_BASE_URL }}
      OSS_ACL: ${{ vars.OSS_ACL }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ANDROID_TEST_KEYSTORE_BASE64: ${{ secrets.ANDROID_TEST_KEYSTORE_BASE64 }}
      ANDROID_TEST_STORE_PASSWORD: ${{ secrets.ANDROID_TEST_STORE_PASSWORD }}
      ANDROID_TEST_KEY_ALIAS: ${{ secrets.ANDROID_TEST_KEY_ALIAS }}
      ANDROID_TEST_KEY_PASSWORD: ${{ secrets.ANDROID_TEST_KEY_PASSWORD }}
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
      INPUT_CHANNEL: ${{ github.event.inputs.channel || '' }}
      INPUT_VERSION_CODE: ${{ github.event.inputs.version_code || '' }}
      INPUT_VERSION_NAME: ${{ github.event.inputs.version_name || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve release settings
        id: release
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL="${INPUT_CHANNEL:-test}"
          if [ "$CHANNEL" != "test" ] && [ "$CHANNEL" != "prod" ]; then
            echo "::error::Invalid channel: $CHANNEL"
            exit 1
          fi
          : "${OSS_BUCKET:=harness--zerg}"
          : "${OSS_ENDPOINT:=oss-ap-southeast-1.aliyuncs.com}"
          : "${OSS_ACL:=public-read}"
          OSS_ENDPOINT="${OSS_ENDPOINT#https://}"
          OSS_ENDPOINT="${OSS_ENDPOINT#http://}"
          OSS_ENDPOINT="${OSS_ENDPOINT%/}"
          BASE_VERSION_CODE="$(sed -n 's/.*orElse(\([0-9][0-9]*\)).*/\1/p' app/build.gradle.kts | head -n 1)"
          BASE_VERSION_NAME="$(sed -n 's/.*orElse("\([^"]*\)").*/\1/p' app/build.gradle.kts | head -n 1)"
          BASE_VERSION_NAME="${INPUT_VERSION_NAME:-$BASE_VERSION_NAME}"
          if [ -z "$BASE_VERSION_CODE" ] || [ -z "$BASE_VERSION_NAME" ]; then
            echo "::error::Failed to resolve base versionCode or versionName from app/build.gradle.kts"
            exit 1
          fi
          if [ -n "$INPUT_VERSION_CODE" ]; then
            VERSION_CODE="$INPUT_VERSION_CODE"
          elif [ "$CHANNEL" = "test" ]; then
            VERSION_CODE=$((BASE_VERSION_CODE + GITHUB_RUN_NUMBER))
          else
            VERSION_CODE="$BASE_VERSION_CODE"
          fi
          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::version_code must be a positive integer: $VERSION_CODE"
            exit 1
          fi
          if [ "$CHANNEL" = "prod" ]; then
            OSS_PREFIX="${OSS_PROD_PREFIX:-harness-apk/prod}"
            OSS_PUBLIC_BASE_URL="${OSS_PROD_PUBLIC_BASE_URL:-${OSS_PUBLIC_BASE_URL:-}}"
            BUILD_TASK=":app:assembleRelease"
            BUILD_TYPE="release"
            ARTIFACT_NAME="app-release.apk"
            VERSION_NAME="$BASE_VERSION_NAME"
            MANIFEST_PROPERTY="prodUpdateManifestUrl"
          else
            OSS_PREFIX="${OSS_TEST_PREFIX:-${OSS_PREFIX:-harness-apk/test}}"
            OSS_PUBLIC_BASE_URL="${OSS_TEST_PUBLIC_BASE_URL:-${OSS_PUBLIC_BASE_URL:-}}"
            BUILD_TASK=":app:assembleDebug"
            BUILD_TYPE="debug"
            ARTIFACT_NAME="app-debug.apk"
            VERSION_NAME="${BASE_VERSION_NAME}-debug"
            MANIFEST_PROPERTY="testUpdateManifestUrl"
          fi
          OSS_PREFIX="${OSS_PREFIX#/}"
          OSS_PREFIX="${OSS_PREFIX%/}"
          if [ -z "${OSS_PUBLIC_BASE_URL}" ]; then
            OSS_PUBLIC_BASE_URL="https://${OSS_BUCKET}.${OSS_ENDPOINT}/${OSS_PREFIX}"
          fi
          {
            echo "CHANNEL=${CHANNEL}"
            echo "OSS_BUCKET=${OSS_BUCKET}"
            echo "OSS_ENDPOINT=${OSS_ENDPOINT}"
            echo "OSS_PREFIX=${OSS_PREFIX}"
            echo "OSS_ACL=${OSS_ACL}"
            echo "OSS_PUBLIC_BASE_URL=${OSS_PUBLIC_BASE_URL%/}"
            echo "BUILD_TASK=${BUILD_TASK}"
            echo "BUILD_TYPE=${BUILD_TYPE}"
            echo "ARTIFACT_NAME=${ARTIFACT_NAME}"
            echo "MANIFEST_PROPERTY=${MANIFEST_PROPERTY}"
            echo "VERSION_CODE=${VERSION_CODE}"
            echo "BASE_VERSION_NAME=${BASE_VERSION_NAME}"
            echo "VERSION_NAME=${VERSION_NAME}"
          } >> "$GITHUB_ENV"

      - name: Validate OSS credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$ALIYUN_ACCESS_KEY_ID" ] || [ -z "$ALIYUN_ACCESS_KEY_SECRET" ]; then
            echo "::error::Missing ALIYUN_ACCESS_KEY_ID or ALIYUN_ACCESS_KEY_SECRET repository secrets"
            exit 1
          fi

      - name: Prepare APK signing
        shell: bash
        run: |
          set -euo pipefail
          if [ "$CHANNEL" = "prod" ]; then
            SIGNING_PREFIX="ANDROID_RELEASE"
            KEYSTORE_FILE="$RUNNER_TEMP/harness-release-keystore.jks"
          else
            SIGNING_PREFIX="ANDROID_TEST"
            KEYSTORE_FILE="$RUNNER_TEMP/harness-test-keystore.jks"
          fi
          required_names=(
            "${SIGNING_PREFIX}_KEYSTORE_BASE64"
            "${SIGNING_PREFIX}_STORE_PASSWORD"
            "${SIGNING_PREFIX}_KEY_ALIAS"
            "${SIGNING_PREFIX}_KEY_PASSWORD"
          )
          missing=false
          for name in "${required_names[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name repository secret for ${CHANNEL} signing"
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            exit 1
          fi
          base64_name="${SIGNING_PREFIX}_KEYSTORE_BASE64"
          printf '%s' "${!base64_name}" | base64 --decode > "$KEYSTORE_FILE"
          {
            echo "${SIGNING_PREFIX}_STORE_FILE=$KEYSTORE_FILE"
          } >> "$GITHUB_ENV"

      - name: Build APK
        run: |
          ./gradlew "$BUILD_TASK" \
            "-P${MANIFEST_PROPERTY}=${OSS_PUBLIC_BASE_URL}/update.json" \
            "-PversionCodeOverride=${VERSION_CODE}" \
            "-PversionNameOverride=${BASE_VERSION_NAME}" \
            --console=plain --no-daemon

      - name: Resolve APK output
        shell: bash
        run: |
          set -euo pipefail
          if [ "$CHANNEL" = "prod" ]; then
            APK_PATH="$(find "app/build/outputs/apk/${BUILD_TYPE}" -maxdepth 1 -name 'app-release*.apk' | sort | head -n 1)"
            if [[ "$APK_PATH" == *unsigned* ]]; then
              echo "::error::Prod APK is unsigned: $APK_PATH"
              exit 1
            fi
          else
            APK_PATH="app/build/outputs/apk/${BUILD_TYPE}/app-debug.apk"
          fi
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "::error::APK output not found"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Prepare release notes
        shell: bash
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes || '' }}
        run: |
          set -euo pipefail
          mkdir -p build/release-notes
          if [ -n "$INPUT_RELEASE_NOTES" ]; then
            printf '%s\n' "$INPUT_RELEASE_NOTES" > build/release-notes/notes.txt
          else
            git log --pretty=format:'%s' -n 8 > build/release-notes/notes.txt
          fi

      - name: Prepare release files
        run: |
          python3 scripts/prepare_apk_release.py \
            --apk "$APK_PATH" \
            --output-dir build/release-oss \
            --public-base-url "$OSS_PUBLIC_BASE_URL" \
            --version-code "$VERSION_CODE" \
            --version-name "$VERSION_NAME" \
            --artifact-name "$ARTIFACT_NAME" \
            --min-supported-version-code "$VERSION_CODE" \
            --release-notes-file build/release-notes/notes.txt

      - name: Upload release files to OSS
        run: python3 scripts/upload_to_oss.py build/release-oss

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-apk-${{ env.VERSION_NAME }}
          path: build/release-oss
